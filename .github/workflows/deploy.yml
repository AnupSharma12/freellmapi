name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.host }}
          username: ${{ secrets.username }}
          key: ${{ secrets.key }}
          script: |
            set -e
            echo "📦 Pulling latest code..."
            cd /var/www/ai
            git pull origin main

            echo "📥 Installing dependencies..."
            npm install --production=false

            echo "🔨 Building..."
            npm run build

            echo "🔄 Restarting server..."
            pm2 restart freellmapi || pm2 start server/dist/index.js --name freellmapi
            pm2 save || true

            echo "✅ Deploy complete!"
          request_pty: true
